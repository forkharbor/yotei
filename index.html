<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予定管理</title>
  <link rel="stylesheet" href="style.css?v=sky-theme-v2">
</head>
<body>

  <header>
    <h1>予定管理</h1>
  </header>

  <main>

    <section class="card calendar-card">
      <div class="calendar-header">
        <h2>カレンダー</h2>
        <div class="calendar-nav">
          <button type="button" class="month-button" onclick="shiftMonth(-1)" aria-label="前の月">‹</button>
          <button type="button" id="calendar-month" class="month-label" onclick="goToday()" aria-label="今月に戻る"></button>
          <button type="button" class="month-button" onclick="shiftMonth(1)" aria-label="次の月">›</button>
        </div>
      </div>
      <div class="weekdays" aria-hidden="true">
        <span class="sun">日</span><span>月</span><span>火</span><span>水</span>
        <span>木</span><span>金</span><span class="sat">土</span>
      </div>
      <div id="calendar-grid" class="calendar-grid"></div>
      <div class="day-agenda">
        <h3 id="selected-day-title"></h3>
        <div class="agenda-form">
          <label>時刻
            <input type="time" id="input-time">
          </label>
          <label>タイトル
            <input type="text" id="input-title" placeholder="例：koyoi">
          </label>
          <label>場所
            <input type="text" id="input-place" placeholder="例：東京駅">
          </label>
          <label>メモ
            <input type="text" id="input-memo" placeholder="例：予約番号 12345">
          </label>
          <button id="btn-add-event" class="btn-primary" onclick="addEvent()" disabled>この日に追加</button>
        </div>
      </div>
      <ul id="event-list"></ul>
      <p id="no-events" class="empty-message">予定がありません</p>
    </section>

  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js?v=calendar-edit"></script>
</body>
</html>
