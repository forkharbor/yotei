<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予定管理</title>
  <link rel="stylesheet" href="style.css?v=shared-db">
</head>
<body>

  <header>
    <h1>予定管理</h1>
  </header>

  <main>

    <section class="card">
      <h2>予定を追加</h2>
      <div class="form-grid">
        <label>日付
          <input type="date" id="input-date">
        </label>
        <label>時刻
          <input type="time" id="input-time">
        </label>
        <label>タイトル
          <input type="text" id="input-title" placeholder="例：koyoi">
        </label>
        <label>場所
          <input type="text" id="input-place" placeholder="例：東京駅">
        </label>
        <label class="full-width">メモ
          <input type="text" id="input-memo" placeholder="例：予約番号 12345">
        </label>
      </div>
      <button id="btn-add-event" class="btn-primary" onclick="addEvent()" disabled>追加する</button>
      <p id="sync-status" class="sync-status">データを同期しています...</p>
    </section>

    <section class="card">
      <h2>予定一覧</h2>
      <div class="tab-row">
        <button id="tab-upcoming" class="tab active" onclick="switchTab('upcoming')">今後の予定</button>
        <button id="tab-past" class="tab" onclick="switchTab('past')">過去の予定</button>
      </div>
      <ul id="event-list"></ul>
      <p id="no-events" class="empty-message">予定がありません</p>
    </section>

  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js?v=shared-db"></script>
</body>
</html>
